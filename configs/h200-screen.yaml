experiment:
  name: h200-screen
  seeds: [7, 19, 43]
  variants: [lewm_ar, mlp, transformer, cfc, ltc]
  output_dir: runs/h200-screen

data:
  dataset: pusht_expert_train.lance
  frameskip: 5
  fraction: 0.1
  # Training windows retain selected episode tensors in the parent process.
  # Keep workers disabled to avoid Docker duplicating those tensors.
  num_workers: 0
  splits: [train, validation, test]

training:
  device: cuda
  max_epochs: 10
  batch_size: 128
  deterministic: false

model:
  variant: lewm_ar
  encoder_mode: upstream
  latent_dim: 192
  action_dim: 192
  hidden_dim: 192
  transformer_heads: 16
  transformer_layers: 6
  transformer_context_length: 3

evaluation:
  rollout_horizons: [1, 5, 10, 20, 50]
  divergence:
    normalized_error_threshold: 10.0
    count_non_finite_as_divergence: true

# Screening protocol only: all five predictors share this fixed budget and split.
# It is not an exact reproduction of the full LeWM-JEPA objective or protocol.
