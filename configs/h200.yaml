experiment:
  name: h200-full
  seeds: [7, 19, 43, 71, 97]
  output_dir: runs/h200

data:
  dataset: pusht_expert_train.lance
  frameskip: 5
  fraction: 1.0
  num_workers: 4
  splits: [train, validation, test]

training:
  device: cuda
  max_epochs: 100
  batch_size: 128
  deterministic: false

model:
  variant: mlp
  encoder_mode: upstream
  latent_dim: 192
  action_dim: 192
  hidden_dim: 192
  transformer_heads: 16
  transformer_layers: 6
  transformer_context_length: 3

evaluation:
  rollout_horizons: [1, 5, 10, 20, 50]
  divergence:
    normalized_error_threshold: 10.0
    count_non_finite_as_divergence: true

# Full H200 protocol: 100 epochs, batch_size 128, 5 seeds.
# batch_size and max_epochs match the pinned upstream config.
