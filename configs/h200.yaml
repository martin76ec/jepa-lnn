experiment:
  name: h200-full
  seeds: [7, 19, 43, 71, 97]
  output_dir: runs/h200

data:
  dataset: pusht_expert_train.lance
  frameskip: 5
  fraction: 1.0
  num_workers: 16
  splits: [train, validation, test]

training:
  device: cuda
  max_epochs: null
  batch_size: null
  deterministic: false

model:
  variant: mlp
  latent_dim: 192
  action_dim: 192
  hidden_dim: 192
  transformer_heads: 16
  transformer_layers: 6
  transformer_context_length: 3

evaluation:
  rollout_horizons: [1, 5, 10, 20, 50]
  divergence:
    normalized_error_threshold: 10.0
    count_non_finite_as_divergence: true

# Populate batch size, maximum epochs, and long horizon during pre-registration.
